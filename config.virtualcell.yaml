# Virtual Cell Literature Tracker Configuration

# API Keys (optional)
api_keys:
  pubmed: null  # https://www.ncbi.nlm.nih.gov/account/

# ============================================================================
# LLM Configuration - DEEPSEEK REQUIRED for keyword extraction
# ============================================================================
# This tracker uses DeepSeek LLM EXCLUSIVELY for:
# 1. Extracting specific technical keywords from papers
# 2. Identifying hot research directions and trends
# 3. Generating insightful analysis reports
#
# ⚠️  Pattern matching has been REMOVED - DeepSeek is required for best results
# ============================================================================

llm:
  enabled: true  # ⚠️  MUST be true for keyword extraction to work
  provider: deepseek  # Only 'deepseek' is supported (no OpenAI, no pattern matching)
  model: deepseek-chat  # DeepSeek's flagship model
  
  # 🔑 GET YOUR API KEY: https://platform.deepseek.com/api-keys
  # Paste your key below between the quotes:
  api_key: YOUR_API_KEY_HERE
  
  # DeepSeek API endpoint (do not change unless using a proxy)
  base_url: https://api.deepseek.com
  
  # Optional: Enable paper summarization (uses same API key)
  enable_summarization: true

# Collection Settings
collection:
  days_back: 1095  # Collect papers from last 3 years
  max_per_query: 200  # Max papers per search query
  
  # Virtual Cell specific queries (customize as needed)
  queries:
    - "virtual cell modeling"
    - "digital twin cell"
    - "whole cell simulation"
    - "AI virtual cell"
    - "machine learning cell model"

# Output Settings
output:
  directory: output
  filename_pattern: "virtual-cell-{date}.md"
  save_latest: true  # Also save as virtual-cell-latest.md

# Filtering
filtering:
  min_relevance_score: 0.5  # Minimum score to include paper
  include_methodology: true  # Include AI/ML/modeling papers
  include_biology: true  # Include biology-focused papers
