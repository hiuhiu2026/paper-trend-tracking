# Virtual Cell Literature Tracker Configuration

# API Keys (optional)
api_keys:
  pubmed: null  # https://www.ncbi.nlm.nih.gov/account/

# LLM Configuration (for auto-summaries AND hot topic analysis)
llm:
  enabled: false  # Disabled - DeepSeek geo-restricted
  provider: null
  model: null
  api_key: null  # DeepSeek key removed

# Collection Settings
collection:
  days_back: 1095  # Collect papers from last 3 years (365 * 3 = 1095 days)
  max_per_query: 200  # Max papers per search query (increased for historical collection)
  
  # Virtual Cell specific queries
  # Edit these to customize your focus
  queries:
    - "virtual cell modeling"
    - "digital twin cell"
    - "whole cell simulation"
    - "AI virtual cell"
    - "machine learning cell model"

# Output Settings
output:
  directory: output
  filename_pattern: "virtual-cell-{date}.md"
  save_latest: true  # Also save as virtual-cell-latest.md

# Filtering
filtering:
  min_relevance_score: 0.5  # Minimum score to include paper
  include_methodology: true  # Include AI/ML/modeling papers
  include_biology: true  # Include biology-focused papers
